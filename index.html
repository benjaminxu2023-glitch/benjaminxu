<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FBF7EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="韩语入门">
<meta name="description" content="韩语入门学习手册：40 个한글字母 + 233 个初级词汇，中韩双语、可发音、可卡片练习。">
<title>한국어 · 韩语入门学习手册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF7EF; --paper-2:#F3EDDF; --ink:#22242A; --ink-soft:#5C5A52; --ink-faint:#948F81;
  --line:#E3DCCA; --red:#C8102E; --blue:#1D4E9E; --blue-soft:#EAF0FA; --red-soft:#FAECEE;
  --card:#FFFFFF; --shadow:0 1px 2px rgba(60,50,30,.06),0 6px 18px rgba(60,50,30,.07);
  --radius:14px;
}
[data-theme="dark"]{
  --paper:#16181D; --paper-2:#1D2026; --ink:#EDE8DC; --ink-soft:#B4AFA1; --ink-faint:#7C776B;
  --line:#2C2F37; --red:#E8455F; --blue:#6E9BE8; --blue-soft:#1D2736; --red-soft:#332024;
  --card:#1E2127; --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 20px rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--paper); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
  line-height:1.55; transition:background .3s,color .3s;
}
.ko{font-family:"Gowun Batang","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",serif}
.rr{font-family:"IBM Plex Mono",ui-monospace,monospace; color:var(--blue); letter-spacing:.02em}
body.hide-rr .rr{display:none}

/* ---------- header ---------- */
header{max-width:1060px;margin:0 auto;padding:52px 20px 8px;text-align:center;position:relative}
.taegeuk{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;
  background:linear-gradient(180deg,var(--red) 50%,var(--blue) 50%);margin:0 10px 6px}
h1.title{font-size:clamp(40px,7vw,66px);line-height:1.1;font-weight:700}
h1 .ko{letter-spacing:.01em}
.subtitle{margin-top:10px;color:var(--ink-soft);font-size:15px}
.subtitle b{color:var(--red);font-weight:600}
.tagline{margin-top:4px;color:var(--ink-faint);font-size:12.5px;font-style:italic}

/* ---------- toolbar ---------- */
.toolbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--paper) 88%,transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:10px 16px;transition:background .3s}
.toolbar-inner{max-width:1060px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.row1{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--line);border-radius:999px;
  background:var(--card);color:var(--ink);font-size:15px;outline:none;transition:border-color .2s}
.search input:focus{border-color:var(--blue)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink-faint)}
.btn{border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:999px;
  padding:8px 14px;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{border-color:var(--ink-faint);color:var(--ink)}
.btn.primary{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}
.btn.primary:hover{filter:brightness(1.08)}
.btn.active-toggle{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.pill{border:1.5px solid var(--line);background:transparent;color:var(--ink-soft);border-radius:999px;
  padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.pill .n{font-size:11px;color:var(--ink-faint);margin-left:4px}
.pill:hover{border-color:var(--ink-faint)}
.pill.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.pill.active .n{color:var(--paper);opacity:.7}

/* ---------- sections / grid ---------- */
main{max-width:1060px;margin:0 auto;padding:26px 20px 80px}
.section{margin-bottom:38px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin:6px 2px 14px;border-bottom:1px solid var(--line);padding-bottom:10px}
.sec-head h2{font-size:21px;font-weight:700}
.sec-head h2 .ko{color:var(--red);margin-right:8px}
.sec-head .desc{color:var(--ink-faint);font-size:12.5px}
.sec-head .count{margin-left:auto;font-size:11px;color:var(--ink-faint);letter-spacing:.12em;white-space:nowrap}
.sub-head{font-size:13px;color:var(--ink-soft);margin:18px 2px 10px;font-weight:600}
.sub-head::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;
  background:linear-gradient(180deg,var(--red) 50%,var(--blue) 50%);margin-right:8px;vertical-align:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px}
.grid.jamo{grid-template-columns:repeat(auto-fill,minmax(128px,1fr))}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 12px;
  box-shadow:var(--shadow);position:relative;transition:transform .15s,border-color .15s;cursor:default}
.card:hover{transform:translateY(-2px);border-color:var(--ink-faint)}
.card .w{font-size:24px;font-weight:700;line-height:1.25;word-break:keep-all}
.card.jamo-card{text-align:center}
.card.jamo-card .w{font-size:40px}
.card.jamo-card .jname{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.card .rr{font-size:12.5px;margin-top:3px}
.card .zh{font-size:13.5px;color:var(--ink-soft);margin-top:5px}
.speak{position:absolute;top:10px;right:10px;width:26px;height:26px;border:none;border-radius:50%;
  background:var(--blue-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.speak svg{width:13px;height:13px;fill:var(--blue)}
.speak:hover{background:var(--blue);}
.speak:hover svg{fill:#fff}
.speak.playing{background:var(--red)}
.speak.playing svg{fill:#fff}
.jamo-card .speak{position:static;margin:8px auto 0}
.empty{padding:60px 0;text-align:center;color:var(--ink-faint);font-size:15px;display:none}

/* ---------- practice overlay ---------- */
.overlay{position:fixed;inset:0;z-index:100;background:color-mix(in srgb,var(--paper) 96%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.ov-top{position:absolute;top:18px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
  padding:0 22px;max-width:760px;margin:0 auto}
.ov-cat{font-size:13px;color:var(--ink-soft)}
.ov-close{border:none;background:transparent;font-size:26px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:6px}
.ov-close:hover{color:var(--ink)}
.flash{width:min(520px,92vw);height:min(340px,52vh);perspective:1200px;cursor:pointer;outline:none}
.flash-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.7,.3,1)}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:26px;text-align:center}
.face.back{transform:rotateY(180deg)}
.face .big{font-size:clamp(44px,9vw,72px);font-weight:700;line-height:1.15;word-break:keep-all}
.face .mid{font-size:clamp(24px,5vw,34px);color:var(--ink)}
.face .rr{font-size:17px}
.face .hint{position:absolute;bottom:14px;font-size:11.5px;color:var(--ink-faint)}
.face .jn{font-size:16px;color:var(--ink-soft)}
.ov-nav{display:flex;align-items:center;gap:18px;margin-top:26px}
.ov-nav .btn{padding:9px 20px}
.ov-count{font-size:13.5px;color:var(--ink-soft);min-width:76px;text-align:center;font-variant-numeric:tabular-nums}
.ov-keys{margin-top:16px;font-size:12px;color:var(--ink-faint)}
@media (max-width:600px){.ov-keys{display:none}}

footer{border-top:1px solid var(--line);padding:26px 20px 40px;text-align:center;color:var(--ink-faint);font-size:12.5px}
footer .taegeuk{width:10px;height:10px;margin:0 6px 3px}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;scroll-behavior:auto}}
button:focus-visible,input:focus-visible,.flash:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
</style>
</head>
<body>

<header>
  <h1 class="title"><span class="ko">한국어</span><span class="taegeuk" aria-hidden="true"></span></h1>
  <h1 class="title" style="font-size:clamp(22px,3.4vw,30px);margin-top:6px">韩语入门学习手册</h1>
  <p class="subtitle"><b>40</b> 个한글字母 · <b>233</b> 个初级词汇 · 中韩双语 · 点击 <span style="color:var(--blue)">♪</span> 听发音</p>
  <p class="tagline">Hangul &amp; core vocabulary for absolute beginners · 세종대왕 1443</p>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="row1">

        <input id="q" type="text" placeholder="搜索 韩文 / 罗马音 / 中文…" autocomplete="off">
      </div>
      <button class="btn active-toggle" id="rrBtn" title="显示/隐藏罗马音">罗马音</button>
      <button class="btn" id="themeBtn" title="切换深浅色">深色</button>
      <button class="btn primary" id="cardBtn">卡片练习</button>
    </div>
    <div class="pills" id="pills"></div>
  </div>
</div>

<main>
  <div id="sections"></div>
  <div class="empty" id="empty">没找到匹配的词，换个词试试？</div>
</main>

<footer>
  한글 by King Sejong · 1443<span class="taegeuk" aria-hidden="true"></span>为初学者精心整理 · 2026
</footer>

<!-- practice overlay -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="卡片练习">
  <div class="ov-top">
    <span class="ov-cat" id="ovCat"></span>
    <button class="ov-close" id="ovClose" aria-label="退出练习">×</button>
  </div>
  <div class="flash" id="flash" tabindex="0" aria-label="翻转卡片">
    <div class="flash-inner">
      <div class="face front" id="faceFront"></div>
      <div class="face back" id="faceBack"></div>
    </div>
  </div>
  <div class="ov-nav">
    <button class="btn" id="prevBtn">← 上一个</button>
    <span class="ov-count" id="ovCount"></span>
    <button class="btn" id="nextBtn">下一个 →</button>
    <button class="btn" id="shufBtn" title="打乱顺序">🔀</button>
  </div>
  <p class="ov-keys">← → 方向键切换 · 空格翻转 · S 发音 · Esc 退出</p>
</div>

let activeCat="all", query="", theme="light", showRR=true;

/* ================= TTS ================= */
let koVoice=null;
function pickVoice(){
  const vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  koVoice=vs.find(v=>/^ko/i.test(v.lang))||null;
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
function speak(text,btn){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ko-KR"; u.rate=0.85;
  if(koVoice) u.voice=koVoice;
  if(btn){
    btn.classList.add("playing");
    u.onend=u.onerror=()=>btn.classList.remove("playing");
  }
  window.speechSynthesis.speak(u);
}

/* ================= HELPERS ================= */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function ttsText(it){return it.t||it.c}
function matches(it,q){
  if(!q) return true;
  const hay=(it.c+" "+(it.n||"")+" "+it.r+" "+it.z).toLowerCase();
  return hay.includes(q);
}

    return `<button class="pill${c.k===activeCat?" active":""}" data-cat="${c.k}">${c.ko?`<span class="ko">${c.ko}</span> `:""}${c.zh}<span class="n">${n}</span></button>`;
  }).join("");
}
pillsEl.addEventListener("click",e=>{

});

    return `<div class="card jamo-card">
      <div class="w ko">${esc(it.c)}</div>
      <div class="jname ko">${esc(it.n)}</div>
      <div class="rr">${esc(it.r)}</div>
      <div class="zh">${esc(it.z)}</div>
      <button class="speak" data-i="${idx}" aria-label="播放发音">${SPK}</button>
    </div>`;
  }
  return `<div class="card">
    <button class="speak" data-i="${idx}" aria-label="播放发音">${SPK}</button>
    <div class="w ko">${esc(it.c)}</div>
    <div class="rr">${esc(it.r)}</div>
    <div class="zh">${esc(it.z)}</div>
  </div>`;
}

function renderSections(){
  const q=query.trim().toLowerCase();
  const cats=activeCat==="all"?CATS.slice(1):CATS.filter(c=>c.k===activeCat);
  let html="",total=0;
  for(const c of cats){
    const items=DATA.map((d,i)=>({d,i})).filter(x=>x.d.cat===c.k&&matches(x.d,q));
    if(!items.length) continue;
    total+=items.length;
    html+=`<section class="section"><div class="sec-head">
      <h2><span class="ko">${c.ko}</span>${c.zh}</h2>
      <span class="desc">${c.desc}</span>
      <span class="count">${items.length} 项</span></div>`;
    const hasSub=items.some(x=>x.d.sub);
    if(hasSub){
      let cur=null,open=false;
      for(const x of items){
        const s=x.d.sub||"其他";
        if(s!==cur){
          if(open) html+="</div>";
          html+=`<div class="sub-head">${esc(s)}</div><div class="grid${c.k==="jamo"?" jamo":""}">`;
          cur=s; open=true;
        }
        html+=cardHTML(x.d,x.i);
      }
      if(open) html+="</div>";
    }else{
      html+=`<div class="grid">${items.map(x=>cardHTML(x.d,x.i)).join("")}</div>`;
    }
    html+="</section>";
  }
  secEl.innerHTML=html;
  emptyEl.style.display=total?"none":"block";
}
secEl.addEventListener("click",e=>{
  const b=e.target.closest(".speak"); if(!b) return;
  speak(ttsText(DATA[+b.dataset.i]),b);
});

/* ================= toolbar events ================= */
document.getElementById("q").addEventListener("input",e=>{query=e.target.value;renderSections()});
document.getElementById("rrBtn").addEventListener("click",e=>{
  showRR=!showRR;
  document.body.classList.toggle("hide-rr",!showRR);
  e.currentTarget.classList.toggle("active-toggle",showRR);
});
document.getElementById("themeBtn").addEventListener("click",e=>{
  theme=theme==="light"?"dark":"light";
  document.documentElement.dataset.theme=theme;
  e.currentTarget.textContent=theme==="light"?"深色":"浅色";
});

/* ================= practice mode ================= */
const overlay=document.getElementById("overlay");
const flash=document.getElementById("flash");
const faceF=document.getElementById("faceFront");
const faceB=document.getElementById("faceBack");
const ovCount=document.getElementById("ovCount");
const ovCat=document.getElementById("ovCat");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function openPractice(){
  const q=query.trim().toLowerCase();
  deck=DATA.filter(d=>(activeCat==="all"||d.cat===activeCat)&&matches(d,q));
  if(!deck.length) deck=DATA.slice();
  shuffle(deck); deckIdx=0; flipped=false;
  const cn=CATS.find(c=>c.k===activeCat);
  ovCat.textContent=`卡片练习 · ${cn?cn.zh:"全部"} · 已打乱`;
  overlay.classList.add("open");
  document.body.style.overflow="hidden";
  renderFlash(); flash.focus();
}
function closePractice(){
  overlay.classList.remove("open");
  document.body.style.overflow="";
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}
function renderFlash(){
  const it=deck[deckIdx];
  flash.classList.toggle("flipped",flipped);
  if(it.cat==="jamo"){
    faceF.innerHTML=`<div class="big ko">${esc(it.c)}</div><div class="hint">空格翻转 · 想想它怎么读？</div>`;
    faceB.innerHTML=`<div class="mid ko">${esc(it.n)}</div><div class="rr">${esc(it.r)}</div><div class="jn">${esc(it.z)}</div><div class="hint">S 键发音</div>`;
  }else{
    faceF.innerHTML=`<div class="big ko">${esc(it.c)}</div><div class="hint">空格翻转 · 想想中文意思？</div>`;
    faceB.innerHTML=`<div class="mid">${esc(it.z)}</div><div class="rr">${esc(it.r)}</div><div class="hint">S 键发音</div>`;
  }
  ovCount.textContent=`${deckIdx+1} / ${deck.length}`;
}
function nav(step){
  deckIdx=(deckIdx+step+deck.length)%deck.length;
  flipped=false; renderFlash();
}
document.getElementById("cardBtn").addEventListener("click",openPractice);
document.getElementById("ovClose").addEventListener("click",closePractice);
document.getElementById("prevBtn").addEventListener("click",()=>nav(-1));
document.getElementById("nextBtn").addEventListener("click",()=>nav(1));
document.getElementById("shufBtn").addEventListener("click",()=>{shuffle(deck);deckIdx=0;flipped=false;renderFlash()});
flash.addEventListener("click",()=>{flipped=!flipped;renderFlash()});
document.addEventListener("keydown",e=>{
  if(!overlay.classList.contains("open")) return;
  if(e.key==="Escape") closePractice();
  else if(e.key==="ArrowRight") nav(1);
  else if(e.key==="ArrowLeft") nav(-1);
  else if(e.key===" "){e.preventDefault();flipped=!flipped;renderFlash()}
  else if(e.key==="s"||e.key==="S") speak(ttsText(deck[deckIdx]));
});

/* ================= init ================= */
renderPills();
renderSections();
</script>
</body>
</html>
